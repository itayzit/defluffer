name = "linkedin-defluffer"
main = "worker.js"
compatibility_date = "2025-06-01"

# Soft abuse limits (fixed 60s window). Tune the numbers freely — these are
# generous for real scrolling but stop a script from hammering the endpoint.
# The hard backstop is your spend cap on the Google account.
[[unsafe.bindings]]
name = "RL_INSTALL"
type = "ratelimit"
namespace_id = "2001"
simple = { limit = 40, period = 60 }

[[unsafe.bindings]]
name = "RL_IP"
type = "ratelimit"
namespace_id = "2002"
simple = { limit = 80, period = 60 }
