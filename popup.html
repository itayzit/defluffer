<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; width: 240px; margin: 0; padding: 16px; color: #1d2226; }
    h1 { font-size: 15px; margin: 0 0 12px; }
    .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .label { font-size: 14px; font-weight: 600; }
    .switch { position: relative; width: 44px; height: 24px; }
    .switch input { display: none; }
    .slider { position: absolute; inset: 0; background: #ccc; border-radius: 24px; cursor: pointer; transition: .2s; }
    .slider::before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; }
    input:checked + .slider { background: #0a66c2; }
    input:checked + .slider::before { transform: translateX(20px); }
    .hint { font-size: 12px; color: #666; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>defluffer</h1>
  <div class="row">
    <span class="label">Defluff feed</span>
    <label class="switch">
      <input type="checkbox" id="toggle" />
      <span class="slider"></span>
    </label>
  </div>
  <div class="hint">Long posts are trimmed to one line as you scroll.</div>
  <script src="popup.js"></script>
</body>
</html>
