<link rel="icon" type="image/png" href="icon.png" />
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff; --ink: #1d2226; --muted: #5b6b7b;
    --blue: #0a66c2; --blue-ink: #004182;
    --line: #e3e2df;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#16191c; --ink:#e9e5df; --muted:#9aa6b1; --line:#2c3237; }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.55; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 620px; margin: 0 auto; padding: 56px 22px 72px; }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 40px; }
  .brand img { width: 34px; height: 34px; }
  .brand b { font-size: 20px; letter-spacing: -0.2px; }
  h1 { font-size: 42px; line-height: 1.08; letter-spacing: -1px; margin: 0 0 16px; }
  h1 .accent { color: var(--blue); }
  .lede { font-size: 19px; color: var(--muted); margin: 0 0 30px; max-width: 30em; }
  .cta {
    display: inline-flex; align-items: center; gap: 9px;
    background: var(--blue); color: #fff; text-decoration: none;
    font-size: 16px; font-weight: 700; padding: 13px 22px; border-radius: 999px;
    transition: background .15s ease, transform .15s ease;
  }
  .cta:hover { background: var(--blue-ink); transform: translateY(-1px); }
  .cta svg { width: 18px; height: 18px; }
  .free { display: block; margin-top: 10px; font-size: 13px; color: var(--muted); }

  .demo-video {
    display: block; width: 100%; margin: 46px 0 0;
    border-radius: 14px; border: 1px solid var(--line);
    box-shadow: 0 18px 50px rgba(16,30,54,.13);
  }

  footer { margin-top: 46px; padding-top: 22px; border-top: 1px solid var(--line);
    font-size: 13px; color: var(--muted); }
  footer a { color: var(--blue); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <main class="wrap">
    <div class="brand">
      <img src="icon.png" alt="" />
      <b>defluffer</b>
    </div>

    <h1>your linkedin feed is<br /><span class="accent">full of fluff.</span></h1>
    <p class="lede">Long, AI-bloated posts become one honest line — as you scroll.</p>

    <a class="cta" href="https://chromewebstore.google.com/detail/defluffer/ofaajilnnjfcinocgpljpmchpcnbhhln">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 6a4 4 0 013.46 6L13 9.6A4 4 0 0112 8zm-8.5 4a8.5 8.5 0 0114.9-5.6l-3 5.2A4 4 0 008 12H3.5zm4.9 3.9A4 4 0 0012 16l2.9 5A8.5 8.5 0 015 15.5l3.4.4zM12 14a2 2 0 110-4 2 2 0 010 4z"/></svg>
      Add to Chrome
    </a>
    <span class="free">Free. No account, no setup, no API key.</span>

    <video class="demo-video" src="demo.mp4" autoplay muted loop playsinline></video>

    <footer>
      Not affiliated with or endorsed by LinkedIn. · <a href="privacy.html">Privacy</a>
    </footer>
  </main>
</body>
</html>
