<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #f4f2ee;
    font-family: -apple-system, "Segoe UI", system-ui, Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: rgba(0,0,0,.9);
  }
  body { overflow: hidden; } /* we drive scroll via transform on .feed */

  /* ---- top nav ---- */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; height: 52px; z-index: 50;
    background: #fff; box-shadow: 0 0 0 1px rgba(0,0,0,.04), 0 2px 4px rgba(0,0,0,.04);
    display: flex; align-items: center; gap: 8px; padding: 0 24px;
  }
  .logo { width: 34px; height: 34px; border-radius: 6px; background: #0a66c2;
    color: #fff; font-weight: 800; font-size: 20px; display: grid; place-items: center;
    font-family: Georgia, serif; }
  .search { width: 264px; height: 34px; background: #edf3f8; border-radius: 6px;
    display: flex; align-items: center; padding: 0 10px; gap: 8px; color: #5a6b77; font-size: 14px; }
  .search svg { width: 16px; height: 16px; fill: #5a6b77; }
  .navspacer { flex: 1; }
  .navicons { display: flex; align-items: center; gap: 26px; }
  .navicon { display: flex; flex-direction: column; align-items: center; gap: 2px; color: #66666b; font-size: 11px; }
  .navicon svg { width: 22px; height: 22px; fill: #66666b; }
  .navicon.active { color: rgba(0,0,0,.9); }
  .navicon.active svg { fill: rgba(0,0,0,.9); }
  .navicon.active::after { content:""; position:absolute; }
  .navme { width: 24px; height: 24px; border-radius: 50%; background: #c9d1d8;
    background-size: cover; }

  /* ---- feed column ---- */
  .stage { position: fixed; inset: 52px 0 0 0; overflow: hidden; }
  .feed { width: 555px; margin: 0 auto; padding-top: 16px; will-change: transform; }

  .card {
    background: #fff; border-radius: 8px; margin-bottom: 8px;
    box-shadow: 0 0 0 1px rgba(0,0,0,.08);
    position: relative; overflow: hidden;
  }
  .card .glow {
    position: absolute; inset: 0; border-radius: 8px; pointer-events: none;
    box-shadow: 0 0 0 2px rgba(10,102,194,0); transition: none; opacity: 0;
  }
  .chead { display: flex; align-items: flex-start; padding: 12px 16px 0 16px; gap: 8px; }
  .avatar { width: 48px; height: 48px; border-radius: 50%; flex: none;
    display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 18px; }
  .who { flex: 1; min-width: 0; padding-top: 1px; }
  .nmeta { display: flex; align-items: center; gap: 4px; }
  .name { font-size: 14px; font-weight: 600; color: rgba(0,0,0,.9); line-height: 18px; }
  .verif { width: 14px; height: 14px; }
  .deg { font-size: 13px; color: rgba(0,0,0,.45); font-weight: 400; }
  .headline { font-size: 12px; color: rgba(0,0,0,.6); line-height: 15px; margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .time { font-size: 12px; color: rgba(0,0,0,.6); display: flex; align-items: center; gap: 3px; margin-top: 1px; }
  .time svg { width: 12px; height: 12px; fill: rgba(0,0,0,.6); }
  .dots { color: rgba(0,0,0,.6); font-size: 20px; line-height: 12px; padding: 0 4px; }

  .body { padding: 8px 16px 0 16px; }
  .original { font-size: 14px; line-height: 20px; color: rgba(0,0,0,.9); overflow: hidden; }
  .original a { color: #0a66c2; font-weight: 600; }
  .more { color: rgba(0,0,0,.6); }

  .summary { overflow: hidden; }
  .sumtext { font-size: 14px; line-height: 20px; color: rgba(0,0,0,.9); padding-top: 0; }
  .pill { display: inline-flex; align-items: center; gap: 6px; margin-top: 6px;
    padding: 3px 10px; font-size: 12px; font-weight: 600; color: #0a66c2;
    background: rgba(10,102,194,.1); border-radius: 14px; }
  .pill .spark { width: 12px; height: 12px; fill: #0a66c2; }

  .media { margin-top: 12px; height: 280px; background-size: cover; background-position: center; }

  .counts { display: flex; align-items: center; gap: 6px; padding: 8px 16px 6px;
    font-size: 12px; color: rgba(0,0,0,.6); }
  .reacts { display: flex; }
  .reacts span { width: 18px; height: 18px; border-radius: 50%; display: inline-grid; place-items: center;
    margin-left: -4px; font-size: 11px; border: 1.5px solid #fff; }
  .reacts span:first-child { margin-left: 0; }
  .cdivider { height: 1px; background: rgba(0,0,0,.08); margin: 0 16px; }
  .actions { display: flex; padding: 4px 8px 6px; }
  .act { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 8px 4px; color: rgba(0,0,0,.6); font-size: 14px; font-weight: 600; border-radius: 4px; }
  .act svg { width: 20px; height: 20px; fill: rgba(0,0,0,.6); }
</style>
</head>
<body>
  <div class="nav">
    <div class="logo">in</div>
    <div class="search">
      <svg viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M11 18a7 7 0 110-14 7 7 0 010 14z" fill="none" stroke="#5a6b77" stroke-width="2"/></svg>
      Search
    </div>
    <div class="navspacer"></div>
    <div class="navicons">
      <div class="navicon active"><svg viewBox="0 0 24 24"><path d="M12 3l9 8h-3v9h-4v-6h-4v6H6v-9H3z"/></svg>Home</div>
      <div class="navicon"><svg viewBox="0 0 24 24"><path d="M9 11a3 3 0 100-6 3 3 0 000 6zm7 0a3 3 0 100-6 3 3 0 000 6zM3 19c0-3 3-5 6-5s6 2 6 5v1H3v-1zm12 .5c0-1.6-.7-3-1.8-4 .6-.3 1.2-.4 1.8-.4 3 0 6 2 6 5v1h-6v-1.6z"/></svg>Network</div>
      <div class="navicon"><svg viewBox="0 0 24 24"><path d="M9 4h6v2h4a1 1 0 011 1v12a1 1 0 01-1 1H5a1 1 0 01-1-1V7a1 1 0 011-1h4V4zm2 2h2V5h-2v1z"/></svg>Jobs</div>
      <div class="navicon"><svg viewBox="0 0 24 24"><path d="M4 4h16a1 1 0 011 1v11a1 1 0 01-1 1H9l-5 4V5a1 1 0 011-1z"/></svg>Messaging</div>
      <div class="navicon"><svg viewBox="0 0 24 24"><path d="M12 22a2.5 2.5 0 002.45-2h-4.9A2.5 2.5 0 0012 22zm7-6V11c0-3-1.6-5.4-4.5-6V4a1.5 1.5 0 00-3 0v1C8.6 5.6 7 8 7 11v5l-2 2v1h14v-1l-2-2z"/></svg>Notifications</div>
      <div class="navicon"><div class="navme"></div>Me ▾</div>
    </div>
  </div>

  <div class="stage">
    <div class="feed" id="feed"></div>
  </div>

<script>
const POSTS = [
  {
    name: "Lior Meitar", color:"#3b6ea5", initials:"LM", verified:true, deg:"1st",
    headline:"Chief of Staff | Columbia Business School MBA | Ex-Naval Officer", time:"1w",
    original:`Excited to share that I'm joining <a>Venn</a> as Chief of Staff! 🎉 Venn is building agentic AI for multifamily real estate — a space that is massively underserved by modern software. After months of conversations, I knew this was the team I wanted to bet on. Endless gratitude to everyone who supported me on this journey. More to come 🙏<span class="more"> …more</span>`,
    summary:"Lior joined Venn as Chief of Staff.",
    react:[["#0a66c2","👍"],["#e0457b","❤️"],["#f5bb5c","👏"]], reactN:"370", comments:"73 comments",
    media:"linear-gradient(135deg,#6a8fc7,#9b7bd6 60%,#e0a3c4)"
  },
  {
    name:"Mansi Bhamu", color:"#b5651d", initials:"MB", verified:true, deg:"1st",
    headline:"MBA Candidate, Wharton | Project Leader - BCG | Principal Investors", time:"1w",
    original:`After an incredible first year at <a>The Wharton School</a>, I'm beyond excited to share that last week I started my summer internship at <a>The Brydon Group</a>, joining the investment team! 🚀 This past year has been a whirlwind of growth, late nights, and the most amazing people. Couldn't be more grateful. Can't wait for everything ahead this summer!<span class="more"> …more</span>`,
    summary:"Mansi started a summer internship at The Brydon Group.",
    react:[["#0a66c2","👍"],["#f5bb5c","👏"],["#e0457b","❤️"]], reactN:"214", comments:"41 comments"
  },
  {
    name:"Mingyi Wu", color:"#2e7d6b", initials:"MW", verified:true, deg:"1st",
    headline:"Wharton MBA '26 | Incoming @ BCG | ex-Bain", time:"22h",
    original:`Two years ago I left my consulting job with no plan — just a feeling that I needed something more. 🎓 Today I'm officially a Wharton MBA graduate, and this fall I'll be joining <a>BCG</a> in San Diego. To everyone who doubted me, and to everyone who believed in me when I didn't believe in myself — thank you. The journey continues 🙏<span class="more"> …more</span>`,
    summary:"Mingyi graduated from Wharton MBA and starts at BCG San Diego.",
    react:[["#0a66c2","👍"],["#e0457b","❤️"],["#f5bb5c","👏"]], reactN:"512", comments:"88 comments",
    media:"linear-gradient(135deg,#1f2a44,#2e7d6b 70%,#7fc7b3)"
  },
  {
    name:"Meghana Dhar", color:"#7a3b9e", initials:"MD", verified:false, deg:"2nd",
    headline:"Ex-Meta, Ex-Snap | Advisor | Keynote Speaker on AI", time:"3d",
    original:`A lot of enterprise AI projects are failing right now. And guess what? It's NOT a technology problem. I've spoken with 50+ leaders this quarter and the pattern is always the same: no clear ownership, no data strategy, and pilots that never had a path to production. Here are the 5 lessons most companies learn far too late 👇<span class="more"> …more</span>`,
    summary:"Meghana lists 5 reasons enterprise AI pilots keep failing.",
    react:[["#0a66c2","👍"],["#f5bb5c","👏"],["#e0457b","❤️"]], reactN:"1,240", comments:"96 comments"
  },
  {
    name:"Gad Shimron", color:"#c0563f", initials:"GS", verified:false, deg:"2nd",
    headline:"Product @ Stealth | Endurance athlete | Writing about tools", time:"5d",
    original:`I finally switched from the Apple Watch to a Garmin after 6 years. Here's my honest take after one month 🧵 The Apple Watch is an incredible smartwatch that happens to track fitness. Garmin is a serious training tool that happens to tell time. If you actually train, the difference is night and day. Long thread below.<span class="more"> …more</span>`,
    summary:"Gad switched from Apple Watch to Garmin for training.",
    react:[["#0a66c2","👍"],["#e0457b","❤️"]], reactN:"89", comments:"34 comments"
  },
  {
    name:"Brianna E. Gurrell", color:"#1d6f8b", initials:"BG", verified:true, deg:"1st",
    headline:"Founder & CEO | Forbes 30 Under 30 | Building the future of X", time:"1w",
    original:`It's only a matter of time. 🙏🏽 Ten years ago, I immigrated to the U.S. with two suitcases and $300. I didn't speak the language. I slept on a friend's floor for eight months while I figured it out. Today, we just closed our Series A. To every immigrant founder grinding in silence — your time is coming. Keep going ❤️<span class="more"> …more</span>`,
    summary:"Brianna's startup closed its Series A.",
    react:[["#e0457b","❤️"],["#0a66c2","👍"],["#f5bb5c","👏"]], reactN:"3,412", comments:"210 comments",
    media:"linear-gradient(135deg,#0f4c5c,#1d6f8b 60%,#86bfd0)"
  }
];

const VERIF = `<svg class="verif" viewBox="0 0 24 24"><path fill="#f5bb5c" d="M12 2l2.4 1.8 3 .1 1 2.8 2.4 1.7-.9 2.9.9 2.9-2.4 1.7-1 2.8-3 .1L12 22l-2.4-1.8-3-.1-1-2.8L3.2 15l.9-2.9-.9-2.9 2.4-1.7 1-2.8 3-.1z"/><path d="M10.6 14.6l-2.2-2.2-1.1 1.1 3.3 3.3 5.5-5.5-1.1-1.1z" fill="#fff"/></svg>`;
const GLOBE = `<svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 2c1.5 0 3 2.5 3 6H9c0-3.5 1.5-6 3-6zM4.3 11H7c.1-2 .6-3.8 1.4-5.1A8 8 0 004.3 11zM7 13H4.3a8 8 0 003.1 5.1C6.6 16.8 6.1 15 7 13zm2 0h6c0 3.5-1.5 6-3 6s-3-2.5-3-6zm8 0h2.7a8 8 0 01-3.1 5.1c.8-1.3 1.3-3.1 1.4-5.1zm0-2c-.1-2-.6-3.8-1.4-5.1A8 8 0 0119.7 11H17z"/></svg>`;
const SPARK = `<svg class="spark" viewBox="0 0 24 24"><path d="M12 2l1.8 5.2L19 9l-5.2 1.8L12 16l-1.8-5.2L5 9l5.2-1.8z"/><path d="M19 14l.9 2.6L22 17l-2.1.4L19 20l-.9-2.6L16 17l2.1-.4z"/></svg>`;
const ICONS = {
  like:`<svg viewBox="0 0 24 24"><path d="M9 21H5a1 1 0 01-1-1v-9a1 1 0 011-1h4v11zm2-11l3.5-7c1.3 0 2.5 1.2 2.5 2.5V8h4a2 2 0 012 2l-1.6 8a2 2 0 01-2 1.6H11V10z" fill="none" stroke="rgba(0,0,0,.6)" stroke-width="1.6"/></svg>`,
  comment:`<svg viewBox="0 0 24 24"><path d="M4 4h16a1 1 0 011 1v11a1 1 0 01-1 1H9l-5 4V5a1 1 0 011-1z" fill="none" stroke="rgba(0,0,0,.6)" stroke-width="1.6"/></svg>`,
  repost:`<svg viewBox="0 0 24 24"><path d="M7 7h9v3l4-4-4-4v3H5v6h2V7zm10 10H8v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>`,
  send:`<svg viewBox="0 0 24 24"><path d="M3 11l18-8-8 18-2-7-8-3z" fill="none" stroke="rgba(0,0,0,.6)" stroke-width="1.6"/></svg>`
};

function cardHTML(p){
  const reacts = p.react.map(r=>`<span style="background:${r[0]}">${r[1]}</span>`).join("");
  const media = p.media ? `<div class="media" style="background-image:${p.media}"></div>` : "";
  return `<div class="card">
    <div class="glow"></div>
    <div class="chead">
      <div class="avatar" style="background:${p.color}">${p.initials}</div>
      <div class="who">
        <div class="nmeta"><span class="name">${p.name}</span>${p.verified?VERIF:""}<span class="deg">• ${p.deg}</span></div>
        <div class="headline">${p.headline}</div>
        <div class="time">${p.time} • ${GLOBE}</div>
      </div>
      <div class="dots">⋯</div>
    </div>
    <div class="body">
      <div class="original">${p.original}</div>
      <div class="summary">
        <div class="sumtext">${p.summary}</div>
        <div class="pill">${SPARK} defluffed · show original</div>
      </div>
    </div>
    ${media}
    <div class="counts">
      <div class="reacts">${reacts}</div>
      <span>${p.reactN}</span><span style="margin-left:auto">${p.comments}</span>
    </div>
    <div class="cdivider"></div>
    <div class="actions">
      <div class="act">${ICONS.like} Like</div>
      <div class="act">${ICONS.comment} Comment</div>
      <div class="act">${ICONS.repost} Repost</div>
      <div class="act">${ICONS.send} Send</div>
    </div>
  </div>`;
}

const feed = document.getElementById("feed");
feed.innerHTML = POSTS.map(cardHTML).join("");

// Measure original + summary heights for each card, then drive collapse.
const cards = [...feed.querySelectorAll(".card")];
const M = cards.map(card=>{
  const orig = card.querySelector(".original");
  const sum = card.querySelector(".summary");
  orig.style.maxHeight="none"; sum.style.maxHeight="none"; sum.style.opacity="1";
  const oH = orig.offsetHeight, sH = sum.offsetHeight;
  return {card, orig, sum, glow:card.querySelector(".glow"), oH, sH};
});

const VH = () => document.querySelector(".stage").clientHeight;
function smooth(x){ x = Math.max(0, Math.min(1, x)); return x*x*(3-2*x); }
function smoother(x){ x = Math.max(0, Math.min(1, x)); return x*x*x*(x*(x*6-15)+10); }

// collapse state c in [0,1] for each card
function setCollapse(i, c){
  const m = M[i];
  const ce = smoother(c);
  m.orig.style.maxHeight = (m.oH*(1-c)) + "px";
  m.orig.style.opacity = String(Math.max(0, 1-ce*1.6));
  m.sum.style.maxHeight = (m.sH*c) + "px";
  m.sum.style.opacity = String(smooth((c-0.30)/0.55));
  const g = c*(1-c)*4; // peaks at c=0.5, 0 at the ends
  // outer glow on the card itself (not clipped by overflow:hidden) + faint inner wash
  m.card.style.boxShadow =
    `0 0 0 1px rgba(0,0,0,.08), 0 0 0 ${(2*g).toFixed(2)}px rgba(10,102,194,${(0.55*g).toFixed(3)}), `+
    `0 8px 26px rgba(10,102,194,${(0.30*g).toFixed(3)})`;
  m.glow.style.opacity = "1";
  m.glow.style.background = `rgba(10,102,194,${(0.06*g).toFixed(3)})`;
}

const N_POSTS = POSTS.length;
const BAND = 0.62;          // how much "front" travel collapses one post
const HOLD = 0.10;          // initial dwell with post 0 expanded
const TAIL = 1.6;           // extra travel so last post collapses + scroll settles
const FOCUS = 0.30;         // active post sits at 30% of viewport

// renderFrame: s in [0,1] overall progress
window.renderFrame = function(frame, total){
  const s = total<=1 ? 0 : frame/(total-1);
  // shape progress: dwell at start, ease through, settle at end
  let p;
  if (s < HOLD) p = 0;
  else p = smoother((s-HOLD)/(1-HOLD));
  const front = p * (N_POSTS - 1 + TAIL);

  for (let i=0;i<N_POSTS;i++){
    const c = Math.max(0, Math.min(1, (front - i)/BAND + 0.0));
    setCollapse(i, c);
  }
  // camera: interpolate between card offsets by fractional front
  const lo = Math.max(0, Math.min(N_POSTS-1, Math.floor(front)));
  const hi = Math.min(N_POSTS-1, lo+1);
  const f = Math.max(0, Math.min(1, front - lo));
  const topLo = M[lo].card.offsetTop;
  const topHi = M[hi].card.offsetTop;
  const anchor = topLo*(1-f) + topHi*f;
  let scroll = anchor - FOCUS*VH() + 8;
  scroll = Math.max(0, scroll);
  feed.style.transform = `translateY(${-scroll}px)`;
  return {s:+s.toFixed(3), front:+front.toFixed(2), scroll:Math.round(scroll)};
};

window.renderFrame(0, 100);
window.__ready = true;
</script>
</body>
</html>
